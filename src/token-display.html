<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self'; img-src 'self' data: file:;">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 196px;
      height: 116px;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif;
      font-size: 12px;
      user-select: none;
      -webkit-app-region: no-drag;
    }

    :root {
      --bg: rgba(255, 255, 255, 0.88);
      --border: rgba(0, 0, 0, 0.12);
      --text: #242427;
      --label: #6b6b70;
      --shadow: rgba(0, 0, 0, 0.16);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: rgba(32, 32, 36, 0.88);
        --border: rgba(255, 255, 255, 0.12);
        --text: #f4f4f5;
        --label: #a1a1aa;
      }
    }

    .token-badge {
      width: 196px;
      min-height: 28px;
      padding: 7px 9px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 8px 18px -12px var(--shadow), 0 2px 4px rgba(0, 0, 0, 0.10);
      backdrop-filter: blur(4px);
      transition: transform 0.15s ease, opacity 0.2s ease;
    }

    .token-summary {
      display: flex;
      align-items: center;
      gap: 4px;
      min-height: 17px;
    }

    .token-icon {
      font-size: 12px;
      line-height: 1;
    }

    .token-value {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      min-width: 32px;
      text-align: center;
    }

    .token-label {
      font-size: 12px;
      color: var(--label);
      line-height: 1;
    }

    .model-rows {
      display: grid;
      gap: 2px;
      margin-top: 5px;
      padding-top: 5px;
      border-top: 1px solid var(--border);
    }

    .model-row {
      display: grid;
      grid-template-columns: 16px minmax(0, 1fr) auto;
      align-items: center;
      gap: 4px;
      min-height: 16px;
    }

    .model-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .model-icon {
      width: 16px;
      height: 16px;
      object-fit: contain;
    }

    .model-name,
    .model-value {
      font-size: 12px;
      line-height: 1;
    }

    .model-name {
      overflow: hidden;
      color: var(--label);
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .model-value {
      color: var(--text);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div class="token-badge" id="tokenBadge">
    <div class="token-summary">
      <span class="token-icon">🪙</span>
      <span class="token-value" id="tokenValue">0</span>
      <span class="token-label">total tk</span>
    </div>
    <div class="model-rows" id="modelRows"></div>
  </div>
  <script src="token-display-models.js"></script>
  <script src="token-display-renderer.js"></script>
</body>
</html>
